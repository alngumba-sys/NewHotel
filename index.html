<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Float — Hospitality Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      
      html, body, #root {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        background: #F4EFE6;
        overflow-x: hidden;
      }
      
      body {
        min-height: 100vh;
      }
      
      #root {
        min-height: 100vh;
        width: 100vw !important;
      }

      /* Force the React app's flex container to fill */
      #root > div {
        width: 100% !important;
        min-height: 100vh;
      }

      table { min-width: max-content; }
      .overflow-y-auto { overflow-x: auto !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
